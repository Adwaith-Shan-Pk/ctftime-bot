name: CTF Time

on:
  workflow_dispatch:
  schedule:
    # Every day at 12:00 AM IST
    # GitHub cron uses UTC
    - cron: "30 18 * * *"

jobs:
  ctf-time-to-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install jq curl -y

      - name: Fetch upcoming CTF events
        shell: bash
        run: |
          set -e

          START=$(date -u +%s)
          END=$(date -u +%s -d "+7 days")

          echo "[*] Fetching CTF events..."

          curl -L -s \
            -H "User-Agent: Mozilla/5.0" \
            "https://ctftime.org/api/v1/events/?limit=15&start=$START&end=$END" \
            -o out.txt

          jq empty out.txt

      - name: Send embeds to Discord
        shell: bash
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

        run: |
          set -e

          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "Missing DISCORD_WEBHOOK_URL secret"
            exit 1
          fi

          LENGTH=$(jq length out.txt)
          LENGTH=$((LENGTH - 1))

          EMBEDS=""

          echo "[*] Building embeds..."

          for i in $(seq 0 $LENGTH); do

              TITLE=$(jq -r ".[$i].title" out.txt)

              START_RAW=$(jq -r ".[$i].start" out.txt)
              END_RAW=$(jq -r ".[$i].finish" out.txt)

              URL=$(jq -r ".[$i].url" out.txt)
              WEIGHT=$(jq -r ".[$i].weight" out.txt)
              FORMAT=$(jq -r ".[$i].format" out.txt)
              LOGO=$(jq -r ".[$i].logo" out.txt)
              ONSITE=$(jq -r ".[$i].onsite" out.txt)

              DURATION_DAYS=$(jq -r ".[$i].duration.days" out.txt)
              DURATION_HOURS=$(jq -r ".[$i].duration.hours" out.txt)

              START_UNIX=$(date -d "$START_RAW" +%s)
              END_UNIX=$(date -d "$END_RAW" +%s)

              if [ "$ONSITE" = "true" ]; then
                FORMAT="$FORMAT"
              else
                FORMAT="Online $FORMAT"
              fi

              DURATION="${DURATION_DAYS} days, ${DURATION_HOURS} hours"

              EMBED=$(jq -n \
                --arg title "$TITLE" \
                --arg url "$URL" \
                --arg weight "$WEIGHT" \
                --arg format "$FORMAT" \
                --arg duration "$DURATION" \
                --arg start "<t:${START_UNIX}:F>" \
                --arg end "<t:${END_UNIX}:F>" \
                --arg logo "$LOGO" \
                '{
                  title: $title,
                  url: $url,
                  color: 3447003,

                  fields: [
                    {
                      name: "Duration",
                      value: $duration,
                      inline: true
                    },
                    {
                      name: "Format",
                      value: $format,
                      inline: true
                    },
                    {
                      name: "Weight",
                      value: $weight,
                      inline: true
                    },
                    {
                      name: "Timeframe",
                      value: ($start + " â†’ " + $end),
                      inline: false
                    }
                  ],

                  thumbnail:
                    (if $logo != "" then {url: $logo} else null end)
                }')

              if [ -z "$EMBEDS" ]; then
                  EMBEDS="$EMBED"
              else
                  EMBEDS="$EMBEDS,$EMBED"
              fi

          done

          PAYLOAD=$(jq -n \
            --argjson embeds "[$EMBEDS]" \
            '{
              content: "@everyone Upcoming CTF Events!",
              embeds: $embeds
            }')

          echo "[*] Sending webhook..."

          curl -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

          echo "[+] Sent successfully"
